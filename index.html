<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>POS Mini</title>

    <style>
      * {
        box-sizing: border-box;
      }

      :root {
        --primary: #0089d6;
        --primary-dark: #006eae;
        --primary-light: #e8f6fd;
        --border: #cfe6f5;
        --surface: #ffffff;
        --page-bg: #073763;
        --text: #0f2533;
        --muted: #5d7180;
      }

      body {
        margin: 0;
        background: var(--page-bg);
        color: var(--text);
        font-family: monospace;
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .pos-layout {
        display: grid;
        grid-template-columns: minmax(240px, 1fr) minmax(320px, 1.25fr) minmax(
            300px,
            1fr
          );
        gap: 24px;
        min-height: 100vh;
        padding: 24px;
      }

      /* ===== POS UI ===== */
      .controls,
      .cart-panel,
      .bill-column {
        align-self: start;
      }

      .controls {
        display: flex;
        flex-direction: column;
        gap: 12px;
        max-height: calc(100vh - 48px);
      }

      .panel,
      .bill-actions {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 16px;
      }

      .panel h3,
      .panel h4 {
        margin: 0 0 10px;
      }

      .form-group {
        margin-bottom: 18px;
      }

      .controls .form-group {
        margin-bottom: 0;
      }

      .table-row {
        display: grid;
        grid-template-columns: 1fr 110px;
        gap: 8px;
        align-items: center;
      }

      .panel input {
        width: 100%;
        margin: 4px 0;
        padding: 9px 10px;
        border: 1px solid var(--border);
        border-radius: 6px;
      }

      .panel input:focus {
        border-color: var(--primary);
        outline: 2px solid var(--primary-light);
      }

      .panel button,
      .bill-actions button {
        width: 100%;
        margin: 4px 0;
        padding: 10px;
        border: 1px solid var(--primary);
        border-radius: 6px;
        background: var(--surface);
        color: var(--primary-dark);
      }

      .panel button:hover,
      .bill-actions button:hover {
        background: var(--primary-light);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
      }

      .actions button {
        margin: 0;
      }

      .actions .primary {
        grid-column: 1 / -1;
        background: var(--primary);
        color: #fff;
      }

      .actions .primary:hover {
        background: var(--primary-dark);
      }

      .save-status {
        min-height: 18px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 12px;
      }

      .menu-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 4px;
      }

      .menu-panel,
      .cart-panel {
        display: flex;
        flex-direction: column;
        max-height: calc(100vh - 48px);
      }

      .menu-panel {
        flex: 1;
        min-height: 260px;
      }

      .menu-search {
        position: sticky;
        top: 0;
        z-index: 1;
        background: var(--surface);
        padding-bottom: 10px;
      }

      .menu-item {
        display: grid;
        grid-template-columns: 1fr;
        gap: 8px;
        align-items: center;
        margin: 6px 0;
      }

      .menu-item button {
        margin: 0;
      }

      .menu-name {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .empty-menu {
        margin: 12px 0 0;
        color: var(--muted);
        font-size: 12px;
        text-align: center;
      }

      .cart-list {
        flex: 1;
        min-height: 0;
        overflow-y: auto;
        padding-right: 4px;
      }

      .cart-item {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 180px;
        gap: 16px;
        align-items: center;
        border-bottom: 1px dashed var(--border);
        padding: 24px 8px;
      }

      .cart-item:first-child {
        padding-top: 0;
      }

      .cart-name {
        overflow-wrap: anywhere;
        word-break: break-word;
      }

      .cart-meta {
        color: var(--muted);
        font-size: 12px;
        margin: 4px 0 8px;
      }

      .cart-controls {
        display: grid;
        grid-template-columns: 44px 64px 44px;
        gap: 8px;
        align-items: center;
      }

      .cart-controls button {
        margin: 0;
      }

      .cart-qty {
        text-align: center;
        font-weight: bold;
      }

      .cart-qty input {
        margin: 0;
        text-align: center;
      }

      @media (max-width: 980px) {
        .cart-item {
          grid-template-columns: 1fr;
        }
      }

      .cart-total {
        margin-top: 12px;
        text-align: right;
        font-weight: bold;
      }

      /* ===== BILL VIEW ===== */
      .bill-column {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .bill-panel {
        display: flex;
        align-items: flex-start;
        justify-content: center;
        max-height: calc(100vh - 162px);
        overflow-y: auto;
        padding: 16px 8px;
        background: var(--primary-light);
        border: 1px solid var(--border);
        border-radius: 8px;
      }

      .bill {
        width: 80mm;
        min-height: 160mm;
        background: var(--surface);
        padding: 10px 8px;
        box-shadow: 0 4px 24px rgba(0, 137, 214, 0.16);
      }

      .bill h2,
      .bill p {
        text-align: center;
        margin: 2px 0;
      }

      .bill h2 {
        font-size: 18px;
      }

      .bill p {
        font-size: 12px;
      }

      .info {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        font-size: 12px;
      }

      table {
        width: 100%;
        font-size: 12px;
        border-collapse: collapse;
        table-layout: fixed;
      }

      th,
      td {
        padding: 2px 1px;
        vertical-align: top;
      }

      th {
        text-align: left;
      }

      .right {
        text-align: right;
      }

      .col-name {
        width: 42%;
      }

      .col-qty {
        width: 12%;
      }

      .col-price {
        width: 21%;
      }

      .col-amount {
        width: 25%;
      }

      .item-name {
        overflow-wrap: anywhere;
        white-space: normal;
        word-break: break-word;
      }

      .qty {
        text-align: center;
      }

      hr {
        border: 0;
        border-top: 1px dashed #000;
      }

      .total {
        text-align: right;
        font-weight: bold;
        font-size: 14px;
      }

      @media (max-width: 760px) {
        .pos-layout {
          grid-template-columns: 1fr;
          padding: 12px;
        }

        .bill-panel {
          justify-content: center;
          max-height: none;
        }
      }

      @media print {
        @page {
          size: 80mm auto;
          margin: 0;
        }

        body {
          background: #fff;
        }

        body * {
          visibility: hidden;
        }

        .bill,
        .bill * {
          visibility: visible;
        }

        .bill {
          position: absolute;
          left: 0;
          top: 0;
          width: 80mm;
          min-height: 0;
          padding: 2mm;
          box-shadow: none;
        }
      }
    </style>
  </head>

  <body>
    <main class="pos-layout">
      <section class="controls" aria-label="Nhập liệu bán hàng">
        <div class="panel form-group">
          <h3>Chọn bàn</h3>
          <div class="table-row">
            <input id="tableInput" placeholder="Nhập số bàn" />
            <button type="button" onclick="setTable()">Chọn bàn</button>
          </div>
        </div>

        <div class="panel form-group menu-panel" aria-label="Chọn món">
          <div class="menu-search">
            <h4>Chọn món</h4>
            <input
              id="menuSearch"
              placeholder="Tìm món"
              oninput="renderQuickMenu()"
            />
          </div>

          <div class="menu-list" id="quickMenuList"></div>
        </div>

        <div class="panel">
          <h4>Nhập món ăn bằng tay</h4>
          <input id="name" placeholder="Tên hàng" />
          <div class="table-row">
            <input id="price" type="number" placeholder="Đơn giá" />
            <input id="qty" type="number" placeholder="SL" />
          </div>
          <button class="primary" type="button" onclick="addItem()">Thêm</button>
        </div>
      </section>

      <section class="panel cart-panel" aria-label="Món đã chọn">
        <h3>Món đã chọn</h3>
        <div class="cart-list" id="cartList"></div>
        <div class="cart-total" id="cartTotal">Tổng: 0</div>
      </section>

      <section class="bill-column" aria-label="Xem trước hóa đơn">
        <div class="bill-panel">
          <div class="bill" id="bill">
            <h2>VIP BIỂN</h2>
            <p>21 Nguyễn Văn Linh, phường Tân Thuận Tây, Q7, TP.HCM</p>
            <p>ĐT: 0902431291</p>

            <hr />

            <div class="info">
              <span>Bàn: <span id="tableNo">VIP 4</span></span>
              <span>Phiếu tính tiền</span>
            </div>

            <div class="info">
              <span id="timeIn"></span>
              <span id="timeOut"></span>
            </div>

            <hr />

            <table id="items">
              <colgroup>
                <col class="col-name" />
                <col class="col-qty" />
                <col class="col-price" />
                <col class="col-amount" />
              </colgroup>
              <tr>
                <th>Tên</th>
                <th class="qty">SL</th>
                <th class="right">Đ.Giá</th>
                <th class="right">Tiền</th>
              </tr>
            </table>

            <hr />

            <div class="total" id="total">TỔNG: 0</div>

            <p>Cảm ơn quý khách!</p>
          </div>
        </div>

        <div class="bill-actions">
          <div class="actions">
            <button type="button" onclick="saveBill()">Lưu bill</button>
            <button type="button" onclick="printBill()">In</button>
          </div>
          <p class="save-status" id="saveStatus"></p>
        </div>
      </section>
    </main>

    <script>
      const APPS_SCRIPT_URL =
        "https://script.google.com/macros/s/AKfycbz30nvnFdlXZUYfu7tlNVRFY3XsFaUWGiCUaG7VW7fAh_p8n6SG3K5t-SRdUgEVM_pX4w/exec";

      let total = 0;
      let items = {};

      const quickMenuItems = [
        { name: "Tiger", price: 21000 },
        { name: "Heineken", price: 21000 },
        { name: "Saigon Special", price: 20000 },
        { name: "Bia 333", price: 18000 },
        { name: "Bia Sài Gòn", price: 18000 },
        { name: "Strongbow", price: 25000 },
        { name: "Nước suối", price: 10000 },
        { name: "Coca", price: 15000 },
        { name: "Pepsi", price: 15000 },
        { name: "7 Up", price: 15000 },
        { name: "Sting", price: 15000 },
        { name: "Red Bull", price: 20000 },
        { name: "Trà đá", price: 5000 },
        { name: "Trà tắc", price: 15000 },
        { name: "Nước cam", price: 25000 },
        { name: "Nước chanh", price: 20000 },
        { name: "Cà phê đen", price: 20000 },
        { name: "Cà phê sữa", price: 25000 },
        { name: "Khăn lạnh", price: 3000 },
        { name: "Đậu phộng", price: 20000 },
        { name: "Trái cây", price: 100000 },
        { name: "Khô gà", price: 60000 },
        { name: "Khô bò", price: 80000 },
        { name: "Mực khô", price: 120000 },
        { name: "Cá viên chiên", price: 50000 },
        { name: "Bò viên chiên", price: 50000 },
        { name: "Khoai tây chiên", price: 45000 },
        { name: "Xúc xích", price: 35000 },
        { name: "Nem chua rán", price: 60000 },
        { name: "Chả giò", price: 60000 },
        { name: "Gỏi bò", price: 120000 },
        { name: "Gỏi hải sản", price: 150000 },
        { name: "Rau muống xào", price: 70000 },
        { name: "Mì xào bò", price: 90000 },
        { name: "Mì xào hải sản", price: 110000 },
        { name: "Cơm chiên trứng", price: 70000 },
        { name: "Cơm chiên hải sản", price: 110000 },
        { name: "Lẩu thái", price: 250000 },
        { name: "Lẩu hải sản", price: 280000 },
        { name: "Tôm nướng", price: 180000 },
        { name: "Mực nướng", price: 160000 },
        { name: "Bạch tuộc nướng", price: 170000 },
        { name: "Nghêu hấp", price: 120000 },
        { name: "Sò lông nướng", price: 140000 },
        { name: "Ốc hương rang muối", price: 180000 },
        { name: "Ốc móng tay xào", price: 150000 },
        { name: "Cánh gà chiên", price: 90000 },
        { name: "Sườn nướng", price: 140000 },
        { name: "Bò lúc lắc", price: 150000 },
        { name: "Phí phục vụ", price: 20000 },
      ];

      function renderQuickMenu() {
        const list = document.getElementById("quickMenuList");
        const search = document
          .getElementById("menuSearch")
          .value.trim()
          .toLowerCase();

        list.innerHTML = "";

        const filteredItems = quickMenuItems.filter((item) =>
          item.name.toLowerCase().includes(search),
        );

        if (!filteredItems.length) {
          list.innerHTML = '<p class="empty-menu">Không có món phù hợp</p>';
          return;
        }

        filteredItems.forEach((item) => {
          const row = document.createElement("div");
          row.className = "menu-item";

          const nameButton = document.createElement("button");
          nameButton.type = "button";
          nameButton.className = "menu-name";
          nameButton.textContent = item.name;
          nameButton.title = item.price.toLocaleString();
          nameButton.addEventListener("click", () =>
            addQuick(item.name, item.price),
          );

          row.appendChild(nameButton);
          list.appendChild(row);
        });
      }

      function addQuick(name, price) {
        addItem(name, 1, price);
      }

      function removeQuick(name) {
        if (!items[name]) return;

        items[name].qty -= 1;

        if (items[name].qty <= 0) {
          delete items[name];
        }

        render();
      }

      function increaseItem(name) {
        if (!items[name]) return;

        items[name].qty += 1;
        render();
      }

      function updateItemQty(name, value) {
        if (!items[name]) return;

        const qty = parseInt(value);

        if (!qty || qty <= 0) {
          delete items[name];
        } else {
          items[name].qty = qty;
        }

        render();
      }

      function addItem(nameInput, qtyInput, priceInput) {
        const isManual = !nameInput;
        const name = nameInput || document.getElementById("name").value.trim();
        const qty = qtyInput || parseInt(document.getElementById("qty").value);
        const price =
          priceInput || parseInt(document.getElementById("price").value);

        if (!name || !qty || !price) return;

        if (items[name]) {
          items[name].qty += qty;
        } else {
          items[name] = { qty, price };
        }

        render();

        if (isManual) {
          document.getElementById("name").value = "";
          document.getElementById("qty").value = "";
          document.getElementById("price").value = "";
          document.getElementById("name").focus();
        }
      }

      function render() {
        total = Object.values(items).reduce(
          (sum, item) => sum + item.qty * item.price,
          0,
        );
        renderCart();
        renderBill();
      }

      function renderCart() {
        const cartList = document.getElementById("cartList");
        cartList.innerHTML = "";

        const selectedItems = Object.entries(items);

        if (!selectedItems.length) {
          cartList.innerHTML = '<p class="empty-menu">Chưa có món nào</p>';
          document.getElementById("cartTotal").innerText = "Tổng: 0";
          return;
        }

        selectedItems.forEach(([name, item]) => {
          const itemTotal = item.qty * item.price;
          const row = document.createElement("div");
          row.className = "cart-item";

          const details = document.createElement("div");
          details.className = "cart-details";
          details.innerHTML = `
            <div class="cart-name">${name}</div>
            <div class="cart-meta">
              ${item.price.toLocaleString()} x ${item.qty} = ${itemTotal.toLocaleString()}
            </div>
          `;

          const controls = document.createElement("div");
          controls.className = "cart-controls";

          const minusButton = document.createElement("button");
          minusButton.type = "button";
          minusButton.textContent = "-";
          minusButton.addEventListener("click", () => removeQuick(name));

          const qty = document.createElement("div");
          qty.className = "cart-qty";

          const qtyInput = document.createElement("input");
          qtyInput.type = "number";
          qtyInput.min = "1";
          qtyInput.value = item.qty;
          qtyInput.addEventListener("change", () =>
            updateItemQty(name, qtyInput.value),
          );
          qtyInput.addEventListener("keydown", (event) => {
            if (event.key === "Enter") {
              updateItemQty(name, qtyInput.value);
            }
          });

          qty.appendChild(qtyInput);

          const plusButton = document.createElement("button");
          plusButton.type = "button";
          plusButton.textContent = "+";
          plusButton.addEventListener("click", () => increaseItem(name));

          controls.append(minusButton, qty, plusButton);
          row.append(details, controls);

          cartList.appendChild(row);
        });

        document.getElementById("cartTotal").innerText =
          "Tổng: " + total.toLocaleString();
      }

      function renderBill() {
        const table = document.getElementById("items");
        table.innerHTML = `
          <colgroup>
            <col class="col-name" />
            <col class="col-qty" />
            <col class="col-price" />
            <col class="col-amount" />
          </colgroup>
          <tr>
            <th>Tên</th>
            <th class="qty">SL</th>
            <th class="right">Đ.Giá</th>
            <th class="right">Tiền</th>
          </tr>
        `;

        for (let name in items) {
          const item = items[name];
          const itemTotal = item.qty * item.price;

          const row = table.insertRow();
          row.innerHTML = `
            <td class="item-name">${name}</td>
            <td class="qty">${item.qty}</td>
            <td class="right">${item.price.toLocaleString()}</td>
            <td class="right">${itemTotal.toLocaleString()}</td>
          `;
        }

        document.getElementById("total").innerText =
          "TỔNG: " + total.toLocaleString();
      }

      function printBill() {
        document.getElementById("timeOut").innerText =
          "Giờ in: " + new Date().toLocaleTimeString();
        window.print();
      }

      function getBillPayload() {
        return {
          createdAt: new Date().toISOString(),
          tableNo: document.getElementById("tableNo").innerText,
          timeIn: document.getElementById("timeIn").innerText,
          timeOut: document.getElementById("timeOut").innerText,
          total,
          items: Object.entries(items).map(([name, item]) => ({
            name,
            qty: item.qty,
            price: item.price,
            amount: item.qty * item.price,
          })),
        };
      }

      function setSaveStatus(message) {
        document.getElementById("saveStatus").innerText = message;
      }

      async function saveBill() {
        if (!APPS_SCRIPT_URL) {
          setSaveStatus("Chưa cấu hình Google Apps Script URL.");
          return;
        }

        if (!Object.keys(items).length) {
          setSaveStatus("Bill chưa có món để lưu.");
          return;
        }

        setSaveStatus("Đang lưu bill...");

        try {
          await fetch(APPS_SCRIPT_URL, {
            method: "POST",
            mode: "no-cors",
            headers: {
              "Content-Type": "text/plain",
            },
            body: JSON.stringify(getBillPayload()),
          });

          setSaveStatus("Đã gửi bill lên Google Sheet.");
        } catch (error) {
          setSaveStatus("Không lưu được bill. Kiểm tra URL hoặc mạng.");
        }
      }

      function resetBill() {
        items = {};
        total = 0;
        render();
        setSaveStatus("");
      }

      function setTable() {
        const t = document.getElementById("tableInput").value.trim();
        if (!t) return;

        document.getElementById("tableNo").innerText = t;
      }

      document.getElementById("timeIn").innerText =
        "Giờ vào: " + new Date().toLocaleTimeString();

      renderQuickMenu();
    </script>
  </body>
</html>
